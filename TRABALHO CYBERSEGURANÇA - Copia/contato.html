<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Formulário de contato para enviar dúvidas, sugestões e reportar erros sobre a cartilha de segurança.">
  <title>Contato | Segurança da Informação</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Icons&display=block">
</head>
<body>

  <header>
    <nav aria-label="Menu principal">
      <a href="index.html" class="nav-logo">🔒 Segurança Digital</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="content-phishing.html">Phishing</a></li>
      <li><a href="content-senhas.html">Senhas</a></li>
      <li><a href="seguranca.html">Gerador de Senhas</a></li>
      <li><a href="sobre.html">Sobre</a></li>
      <li><a href="contato.html" class="ativa" aria-current="page">Contato</a></li>
    </ul>
    <div class="nav-botoes">
      <button type="button" id="botao-tema" aria-label="Alternar tema">🌙 Tema</button>
      <button type="button" id="botao-fonte" aria-label="Aumentar acessibilidade"><span class="material-icons">accessibility</span> Acessibilidade</button>
    </div>
  </nav>
  </header>

  <main>

    <section>
      <h1>✉️ Contato</h1>
      <p>Tem dúvidas ou sugestões sobre a cartilha? Preencha o formulário abaixo.</p>
    </section>

    <section>
      <form id="contato-form" class="form-grupo" novalidate>
        <div id="feedback-form" class="form-feedback" aria-live="polite"></div>
        <div>
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
        </div>

        <div>
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required>
        </div>

        <div>
          <label for="assunto">Assunto</label>
          <select id="assunto" name="assunto">
            <option value="duvida">Dúvida sobre o conteúdo</option>
            <option value="sugestao">Sugestão de melhoria</option>
            <option value="erro">Reportar erro na página</option>
            <option value="outro">Outro</option>
          </select>
        </div>

        <div>
          <label for="mensagem">Mensagem</label>
          <textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem..." required></textarea>
        </div>

        <button type="submit" class="btn-enviar">Enviar</button>
      </form>
    </section>

  </main>

  <footer>
    <p>Projeto Web Lab · UPF 2025 &nbsp;|&nbsp;
      <a href="sobre.html">Sobre o grupo</a>
      <a href="contato.html">Contato</a>
    </p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
